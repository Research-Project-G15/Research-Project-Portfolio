<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Land Registry | Welcome</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3b82f6;
            /* Matching typical tech blue */
            --primary-glow: rgba(59, 130, 246, 0.5);
            --bg-color: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: transparent;
            overflow: hidden;
            /* Prevent scrolling on landing page */
        }

        /* Video Background Container */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background-color: #000;
        }

        .video-container video {
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0.8;
            filter: grayscale(20%) contrast(120%);
        }

        /* Overlay to make text readable */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.7) 100%);
            z-index: -1;
        }

        /* Main Content */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: #ffffff;
            text-align: center;
            padding: 0 20px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 50px;
            color: #60a5fa;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 24px;
            animation: fadeInDown 1s ease-out;
            backdrop-filter: blur(4px);
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 1.2s ease-out;
            max-width: 900px;
        }

        p {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: #cbd5e1;
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
            animation: fadeInUp 1.4s ease-out;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        /* Call to Action Button */
        .btn-enter {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            font-size: 1.125rem;
            font-weight: 600;
            color: #ffffff;
            background: var(--primary-color);
            border: 2px solid transparent;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: zoomIn 1.6s ease-out;
            opacity: 0;
            animation-fill-mode: forwards;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-enter::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .btn-enter:hover::before {
            transform: translateX(100%);
        }

        .btn-enter:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--primary-glow);
            background: #2563eb;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-enter i {
            transition: transform 0.3s ease;
        }

        .btn-enter:hover i {
            transform: translateX(4px);
        }

        /* Floating particles or decorative elements (optional pure CSS addition) */
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            z-index: -1;
            animation: pulse 4s infinite alternate ease-in-out;
        }

        .decor-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
        }

        .decor-2 {
            width: 600px;
            height: 600px;
            bottom: -200px;
            left: -200px;
            animation-delay: 2s;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            100% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        /* Loading fallback */
        .video-fallback-bg {
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') center/cover no-repeat;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
        }
    </style>
</head>

<body>

    <!-- Fallback background image if video fails to load or while loading -->
    <div class="video-fallback-bg"></div>

    <!-- Video Background Container -->
    <div class="video-container">
        <video autoplay muted playsinline id="bg-video"
            poster="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop">
            <source src="src/1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- Overlay Layer for readability -->
    <div class="overlay"></div>

    <!-- Decorative Glowing Elements -->
    <div class="decor-circle decor-1"></div>
    <div class="decor-circle decor-2"></div>

    <!-- Main Content centered -->
    <main class="content">
        <div class="badge">
            <i class="fas fa-link"></i> Web3 Integrated System
        </div>

        <h1>The Future of Secure <br> Land Registration</h1>

        <p>A comprehensive, transparent, and absolutely immutable blockchain-based land deed verification system built
            for Sri Lanka.</p>

        <a href="home.html" class="btn-enter" aria-label="Enter Home Page">
            Enter Platform <i class="fas fa-arrow-right"></i>
        </a>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var video = document.getElementById("bg-video");

            // Video playlist array
            var playlist = ["src/1.mp4", "src/2.mp4"];
            var currentVideoIndex = 0;

            // Handle switching to the next video when the current one ends
            video.addEventListener('ended', function () {
                currentVideoIndex = (currentVideoIndex + 1) % playlist.length;
                video.src = playlist[currentVideoIndex];
                video.play().catch(function (error) {
                    console.log("Autoplay prevented on next video:", error);
                });
            });

            // Play promise helps catch autoplay prevention
            var playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise.catch(function (error) {
                    // Auto-play was prevented; fallback will show
                    console.log("Autoplay prevented:", error);
                });
            }
        });
    </script>
</body>

</html>
